# 모든 컨테이너 공통 — 로그 무한 누적 방지 (개인정보 최소 보관 원칙)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build: ./backend
    container_name: rally-backend
    logging: *default-logging
    environment:
      # 운영에서는 .env 파일이나 시크릿으로 주입할 것
      RALLY_ADMIN_USER: ${RALLY_ADMIN_USER:-admin}
      RALLY_ADMIN_PASS: ${RALLY_ADMIN_PASS:?RALLY_ADMIN_PASS를 .env에 설정하세요}
      RALLY_TOKEN_SECRET: ${RALLY_TOKEN_SECRET:?RALLY_TOKEN_SECRET을 .env에 설정하세요}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      ITS_API_KEY: ${ITS_API_KEY:-}
      LAW_OC: ${LAW_OC:-}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD를 .env에 설정하세요}
    volumes:
      - rally-data:/app/data
    restart: unless-stopped
    networks: [rally]

  frontend:
    build: ./frontend
    container_name: rally-frontend
    logging: *default-logging
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks: [rally]

  # 운영 전용 — HTTPS 종단. 실행: WEB_PORT=127.0.0.1:8081 docker compose --profile prod up -d
  caddy:
    image: caddy:2-alpine
    container_name: rally-caddy
    logging: *default-logging
    profiles: [prod]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped
    networks: [rally]

volumes:
  rally-data:
  caddy-data:
  caddy-config:

networks:
  rally:
