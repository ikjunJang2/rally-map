spring.application.name=rally-api
server.port=8080

# H2 파일 DB — 재시작해도 공지/POI 유지
spring.datasource.url=jdbc:h2:file:./data/rallydb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 공지 등록용 관리 키 — 운영 배포 시 환경변수 RALLY_ADMIN_KEY 로 반드시 교체
rally.admin-key=${RALLY_ADMIN_KEY:dev-key-change-me}
