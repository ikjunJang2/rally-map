spring.application.name=rally-api
server.port=8080

# H2 파일 DB — 재시작해도 공지/POI 유지
spring.datasource.url=jdbc:h2:file:./data/rallydb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 관리자 계정·토큰 시크릿 — 운영 배포 시 환경변수로 반드시 교체
rally.admin.username=${RALLY_ADMIN_USER:admin}
rally.admin.password=${RALLY_ADMIN_PASS:dev-password-change-me}
rally.admin.token-secret=${RALLY_TOKEN_SECRET:dev-secret-change-me}
