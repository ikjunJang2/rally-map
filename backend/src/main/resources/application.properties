spring.application.name=rally-api
server.port=8080
# 검증 실패 시 어떤 필드가 왜 거부됐는지 응답에 포함 (민감정보 아님)
server.error.include-message=always
server.error.include-binding-errors=always

# H2 파일 DB — 저장 데이터 암호화(AES). 운영은 DB_PASSWORD 환경변수로 키 주입.
# 압수수색·기기 탈취 시 DB 파일이 평문으로 읽히지 않게 함 (개발 기본키는 단순값).
spring.datasource.url=jdbc:h2:file:./data/rallydb;CIPHER=AES
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:dev-file-key} sa
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 관리자 계정·토큰 시크릿 — 기본값 없음(운영 미설정 시 기동 실패로 안전).
# 로컬 개발은 .env 또는 IDE 환경변수로 주입.
rally.admin.username=${RALLY_ADMIN_USER:}
rally.admin.password=${RALLY_ADMIN_PASS:}
rally.admin.token-secret=${RALLY_TOKEN_SECRET:}
# 잠금 복구 — true로 기동하면 부팅 시 DB의 관리자 비번(admin.pw)을 비워 RALLY_ADMIN_PASS 기본값으로 복구.
# 엔드포인트가 아니라 서버 접근 권한이 있어야만 동작. 복구 후 반드시 꺼야 함(deploy/reset-admin-pw.sh가 처리).
rally.admin.reset-on-start=${ADMIN_RESET_PASSWORD:false}

# 유튜브 라이브 자동 수집 — 키 없으면 자동 비활성 (console.cloud.google.com에서 발급)
rally.youtube.api-key=${YOUTUBE_API_KEY:}
# 검색어는 짧을수록 잘 잡힘 — 너무 구체적인 문구는 라이브 제목과 안 맞아 0건이 됨
# 주의: .properties는 Latin-1로 읽히므로 한글은 반드시 \uXXXX 이스케이프로 작성
# (원문: 부정선거, 재선거, 선관위, 올림픽공원 집회, 잠실 집회 — 환경변수로 덮어쓰기 가능)
rally.youtube.queries=\uBD80\uC815\uC120\uAC70,\uC7AC\uC120\uAC70,\uC120\uAD00\uC704,\uC62C\uB9BC\uD53D\uACF5\uC6D0 \uC9D1\uD68C,\uC7A0\uC2E4 \uC9D1\uD68C
# 자동 수집 제외 채널 — 쉼표 구분, 채널명 부분일치(대소문자 무시). 환경변수로 변경 가능
rally.youtube.excluded-channels=${YOUTUBE_EXCLUDED_CHANNELS:MBC,YTN,JTBC}
# title/channel keyword block (comma-separated, env-merged with code defaults like Running Man re-runs / webcams).
# Korean words must go via the env var (this file is read as Latin-1).
rally.youtube.excluded-keywords=${YOUTUBE_EXCLUDED_KEYWORDS:}
# search.list 100유닛/호출, 무료 일일 한도 = search.list 100회/일. 검색어 5개 × 120분 간격(12주기) =
# 하루 60회로 40회 여유(잦은 재배포·재시작 대비). 더 촘촘히 하려면 쿼터 상향(YouTube 감사 폼) 필요.
rally.youtube.search-interval-ms=${YOUTUBE_SEARCH_INTERVAL_MS:7200000}
rally.youtube.status-interval-ms=${YOUTUBE_STATUS_INTERVAL_MS:90000}

# ITS 국가교통정보센터 CCTV — 키 없으면 자동 비활성 (its.go.kr/opendata에서 발급)
rally.its.api-key=${ITS_API_KEY:}

# 국가법령정보센터 법령 검색 — OC(오픈API 이메일ID) 없으면 자동 비활성 (open.law.go.kr에서 신청)
rally.law.oc=${LAW_OC:}

# 삭제된 글·댓글 이력 보존 기간(일) — 경과 시 자동 완전 파기 (개인정보처리방침에 고지됨)
rally.community.retention-days=${COMMUNITY_RETENTION_DAYS:180}
