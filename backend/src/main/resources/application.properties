spring.application.name=rally-api
server.port=8080
# 검증 실패 시 어떤 필드가 왜 거부됐는지 응답에 포함 (민감정보 아님)
server.error.include-message=always
server.error.include-binding-errors=always

# H2 파일 DB — 재시작해도 공지/POI 유지
spring.datasource.url=jdbc:h2:file:./data/rallydb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 관리자 계정·토큰 시크릿 — 운영 배포 시 환경변수로 반드시 교체
rally.admin.username=${RALLY_ADMIN_USER:admin}
rally.admin.password=${RALLY_ADMIN_PASS:dev-password-change-me}
rally.admin.token-secret=${RALLY_TOKEN_SECRET:dev-secret-change-me}

# 유튜브 라이브 자동 수집 — 키 없으면 자동 비활성 (console.cloud.google.com에서 발급)
rally.youtube.api-key=${YOUTUBE_API_KEY:}
# 검색어는 짧을수록 잘 잡힘 — 너무 구체적인 문구는 라이브 제목과 안 맞아 0건이 됨
# 주의: .properties는 Latin-1로 읽히므로 한글은 반드시 \uXXXX 이스케이프로 작성
# (원문: 재선거, 잠실 집회, 핸드볼경기장 — 환경변수 RALLY_YOUTUBE_QUERIES로 덮어쓰기 가능)
rally.youtube.queries=\uC7AC\uC120\uAC70,\uC7A0\uC2E4 \uC9D1\uD68C,\uD578\uB4DC\uBCFC\uACBD\uAE30\uC7A5
# 자동 수집 제외 채널 — 쉼표 구분, 채널명 부분일치(대소문자 무시). 환경변수로 변경 가능
rally.youtube.excluded-channels=${YOUTUBE_EXCLUDED_CHANNELS:MBC,YTN,JTBC}
# search.list는 100유닛/호출 — 간격을 줄이면 일일 쿼터(10,000) 초과 주의
rally.youtube.search-interval-ms=${YOUTUBE_SEARCH_INTERVAL_MS:900000}
rally.youtube.status-interval-ms=${YOUTUBE_STATUS_INTERVAL_MS:60000}

# ITS 국가교통정보센터 CCTV — 키 없으면 자동 비활성 (its.go.kr/opendata에서 발급)
rally.its.api-key=${ITS_API_KEY:}
