server {
    listen 80;
    server_name _;

    # "추적기 없음" 약속 이행 — 방문자 IP가 어디에도 기록되지 않게 접속로그 비활성
    access_log off;
    # 서버 버전 노출 차단 (정찰 방어)
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # 정적 자산 캐싱 (해시가 파일명에 박히므로 장기 캐시 안전)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API → 백엔드 컨테이너 (개인정보 최소화: 클라이언트 IP를 백엔드로 전달하지 않음)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
    }

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # XSS 심층 방어 — 관리자 토큰 탈취 스크립트 차단. 사용하는 출처만 허용.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://*.ytimg.com https://*.ggpht.com https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://server.arcgisonline.com; connect-src 'self'; media-src 'self' https: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}
