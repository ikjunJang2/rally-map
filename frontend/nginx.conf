# 지도 타일 프록시 캐시 (conf.d 파일은 http 컨텍스트 안에 include되므로 여기 선언 가능)
proxy_cache_path /tmp/tile_cache levels=1:2 keys_zone=tiles:10m max_size=300m inactive=14d use_temp_path=off;

server {
    listen 80;
    server_name _;

    # "추적기 없음" 약속 이행 — 방문자 IP가 어디에도 기록되지 않게 접속로그 비활성
    access_log off;
    # 서버 버전 노출 차단 (정찰 방어)
    server_tokens off;

    # 외부 타일 서버 이름 해석용 (Docker 내장 DNS)
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    # 지도 타일 1차(동일출처) 프록시 — 모바일 추적차단/사파리 ITP가 타사 타일을 막는 문제 우회.
    # 사용자는 타일 서버에 직접 접속하지 않음(프라이버시↑). 서버가 referer를 붙여 핫링크 차단도 회피. 14일 캐시.
    location ~ ^/tiles/osm/(?<tp>.+)$ {
        proxy_pass https://tile.openstreetmap.org/$tp;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_set_header Referer https://www.openstreetmap.org/;
        proxy_set_header User-Agent "63freedom-civic-map/1.0 (+https://www.63freedom.com)";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache tiles;
        proxy_cache_valid 200 14d;
        proxy_hide_header Set-Cookie;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=1209600";
        add_header X-Tile-Cache $upstream_cache_status;
    }
    location ~ ^/tiles/esri/(?<tp>.+)$ {
        proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/$tp;
        proxy_set_header Host server.arcgisonline.com;
        proxy_set_header Referer https://www.arcgis.com/;
        proxy_set_header User-Agent "63freedom-civic-map/1.0 (+https://www.63freedom.com)";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache tiles;
        proxy_cache_valid 200 14d;
        proxy_hide_header Set-Cookie;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=1209600";
        add_header X-Tile-Cache $upstream_cache_status;
    }

    # 정적 자산 캐싱 (해시가 파일명에 박히므로 장기 캐시 안전)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API → 백엔드 컨테이너 (개인정보 최소화: 클라이언트 IP를 백엔드로 전달하지 않음)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
    }

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # XSS 심층 방어 — 관리자 토큰 탈취 스크립트 차단. 지도 타일은 동일출처 프록시라 img-src에 타사 불필요.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://*.ytimg.com https://*.ggpht.com; connect-src 'self'; media-src 'self' https: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}
